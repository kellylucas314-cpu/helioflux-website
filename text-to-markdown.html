<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text → Markdown</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0e1a; 
      color: #fff; 
      min-height: 100vh;
      padding: 40px;
    }
    h1 { font-size: 24px; font-weight: 300; margin-bottom: 24px; }
    h1 span { color: #00c8f0; }
    .container { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 24px; 
      max-width: 1400px; 
      margin: 0 auto;
    }
    .panel { background: #070b15; border-radius: 8px; padding: 24px; }
    label { font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: #00c8f0; display: block; margin-bottom: 12px; }
    textarea { 
      width: 100%; 
      height: 400px; 
      background: #0a0e1a; 
      border: 1px solid rgba(255,255,255,0.1); 
      border-radius: 4px;
      color: #fff; 
      font-family: 'SF Mono', Monaco, monospace; 
      font-size: 14px; 
      padding: 16px;
      resize: vertical;
    }
    textarea:focus { outline: none; border-color: #00c8f0; }
    .buttons { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
    button { 
      padding: 12px 24px; 
      border: none; 
      border-radius: 4px; 
      font-size: 14px; 
      cursor: pointer; 
      transition: all 0.2s;
    }
    .btn-primary { background: #00c8f0; color: #0a0e1a; font-weight: 600; }
    .btn-primary:hover { background: #20d6f8; }
    .btn-secondary { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff; }
    .btn-secondary:hover { border-color: #00c8f0; color: #00c8f0; }
    .status { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 12px; min-height: 20px; }
    .status.success { color: #00c8f0; }
    .tips { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 16px; line-height: 1.6; }
    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; }
      body { padding: 20px; }
    }
  </style>
</head>
<body>
  <h1>Text → <span>Markdown</span></h1>
  
  <div class="container">
    <div class="panel">
      <label>Paste your text</label>
      <textarea id="input" placeholder="Paste any text here..."></textarea>
      <div class="buttons">
        <button class="btn-primary" onclick="convert()">Convert to Markdown</button>
        <button class="btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      <div class="tips">
        <strong>Tips:</strong> Paste articles, notes, or any text. Headers, quotes, and lists will be formatted.
      </div>
    </div>
    
    <div class="panel">
      <label>Markdown output</label>
      <textarea id="output" placeholder="Markdown will appear here..."></textarea>
      <div class="buttons">
        <button class="btn-primary" onclick="copyOutput()">Copy to Clipboard</button>
        <button class="btn-secondary" onclick="download()">Download .md</button>
      </div>
      <div class="status" id="status"></div>
    </div>
  </div>

  <script>
    function convert() {
      let text = document.getElementById('input').value;
      if (!text.trim()) return;
      
      // Normalize
      text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      
      let lines = text.split('\n');
      let output = [];
      
      for (let i = 0; i < lines.length; i++) {
        let line = lines[i].trim();
        
        // Skip empty lines but preserve paragraph breaks
        if (!line) {
          output.push('');
          continue;
        }
        
        // Detect quotes (starts with – or — or "From)
        if (/^[–—-]\s*From\s/i.test(line) || /^[–—]\s*".+"/i.test(line)) {
          output.push('> ' + line);
          continue;
        }
        
        // Detect numbered headers: "1. Title here" or "10. Title here"
        let numberedMatch = line.match(/^(\d+)\.\s+(.+)$/);
        if (numberedMatch && numberedMatch[2].length < 80) {
          output.push('');
          output.push('## ' + numberedMatch[1] + '. ' + numberedMatch[2]);
          continue;
        }
        
        // Detect ALL CAPS headers
        if (/^[A-Z][A-Z\s&']{3,}$/.test(line) && line.length < 60) {
          let titleCased = line.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
          output.push('');
          output.push('## ' + titleCased);
          continue;
        }
        
        // Detect short title-like lines (no period, short, before longer text)
        if (line.length < 50 && !line.endsWith('.') && !line.endsWith(',') && i < lines.length - 1) {
          let nextLine = lines[i + 1]?.trim();
          if (nextLine && nextLine.length > line.length * 2) {
            output.push('');
            output.push('## ' + line);
            continue;
          }
        }
        
        // Detect bullet points
        if (/^[•·◦‣⁃]\s*/.test(line)) {
          output.push('- ' + line.replace(/^[•·◦‣⁃]\s*/, ''));
          continue;
        }
        
        // Regular line
        output.push(line);
      }
      
      // Clean up multiple blank lines
      let result = output.join('\n')
        .replace(/\n{3,}/g, '\n\n')
        .trim();
      
      document.getElementById('output').value = result;
      document.getElementById('status').textContent = 'Converted!';
      document.getElementById('status').className = 'status success';
    }
    
    function copyOutput() {
      const text = document.getElementById('output').value;
      if (!text) return;
      navigator.clipboard.writeText(text);
      document.getElementById('status').textContent = 'Copied!';
      document.getElementById('status').className = 'status success';
    }
    
    function download() {
      const text = document.getElementById('output').value;
      if (!text) return;
      const blob = new Blob([text], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'converted.md';
      a.click();
      document.getElementById('status').textContent = 'Downloaded!';
      document.getElementById('status').className = 'status success';
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
      document.getElementById('status').textContent = '';
    }
  </script>
</body>
</html>
